<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tezos Protocol Cities Map — Upgrade & Governance History</title>
<link rel="canonical" href="https://oyatrino.github.io/tezosprotocolmap/">
<meta name="keywords" content="Tezos, Tezos protocols, protocol upgrade, on-chain governance, Tezos voting, Octez, blockchain map, interactive map, Athens, Paris, Quebec, Seoul, Tezos roadmap">
<link rel="apple-touch-icon" href="favicon.png">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebApplication","name":"Tezos Protocol Cities Map","url":"https://oyatrino.github.io/tezosprotocolmap/","applicationCategory":"BrowserApplication","operatingSystem":"Web","browserRequirements":"Requires JavaScript","description":"Interactive map of Tezos protocol-upgrade cities and on-chain governance history, rendered on a world globe.","author":{"@type":"Organization","name":"oyatrino"}}
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/gh/periplum/periplum-core@v0.3.2/dist/periplum.js"></script>
</head>
<body>
<script>
  // Turn the existing protocols.json (keyed by name) into Periplum canonical items.
  function adapt(raw) {
    return Object.keys(raw).map(function (name) {
      var d = raw[name];
      var pop = {
        "Hash": d.hash ? d.hash.slice(0, 12) + "…" : "N/A",
        "Activated": d.activationDate ? d.activationDate.split("T")[0] : "N/A",
        "Network": d.mainnet ? "Mainnet" : "Testnet only"
      };
      if (d.voting) {
        pop["Vote"] = "Epoch " + d.voting.epoch + " — " + d.voting.result;
        pop["Ballots"] = d.voting.yayBallots + " yay / " + d.voting.nayBallots + " nay / " + d.voting.passBallots + " pass";
      }
      var placements = (d.lat != null && d.lon != null)
        ? [{ map: "earth", lat: d.lat, lon: d.lon, label: name, popup: pop }] : [];
      return {
        name: String(d.number).padStart(3, "0") + " " + name,
        date: d.activationDate || null,
        status: d.mainnet ? "mainnet" : "testnet only",
        _num: d.number, placements: placements
      };
    }).filter(function (it) { return it.placements.length; })
      .sort(function (a, b) { return a._num - b._num; });
  }

  Periplum.render({
    title: "Tezos Protocol Cities",
    dataUrl: "https://raw.githubusercontent.com/oyatrino/tezosprotocolmap/main/protocols.json",
    adapt: adapt,
    repo: "https://github.com/oyatrino/tezosprotocolmap",
    favicon: "favicon.png",
    theme: { headerBg: "#1a1a2e", accent: "#4da3ff" },
    routeLabel: "Chronological trail",
    statusColors: { "mainnet": "#1f77b4", "testnet only": "#ff7f0e" },
    seo: {
      description: "Interactive map of Tezos protocol upgrades, each named after a city, plotted on a world globe as a chronological governance trail with on-chain voting results.",
      image: "https://raw.githubusercontent.com/oyatrino/tezosprotocolmap/main/map.png"
    },
    basemaps: [
      { id: "earth", name: "🌍 Earth", type: "tiles",
        tileUrl: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        attribution: "&copy; OpenStreetMap contributors",
        minZoom: 2, initialView: [30, 20], initialZoom: 3 }
    ]
  });
</script>
</body>
</html>
