name: Update Tezos Protocol GPX

on:
  schedule:
    - cron: "0 9 1 */3 *" # 1st of every 3rd month at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gpx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgeos-dev libproj-dev

      - name: Install dependencies
        run: pip install requests beautifulsoup4 cartopy matplotlib

      - name: Run update script
        run: python scripts/update_gpx.py --url "${{ vars.NAMING_URL }}"

      - name: Generate map
        run: python scripts/generate_map.py

      - name: Commit and push if changed
        run: |
          git diff --quiet tezos.gpx map.png protocols.json protocol-count.json 2>/dev/null && [ -z "$(git ls-files --others --exclude-standard tezos.gpx map.png protocols.json protocol-count.json)" ] && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tezos.gpx map.png protocols.json protocol-count.json
          git commit -m "Update tezos.gpx and map with new protocol cities"
          git push
